# Render Blueprint for Møtetranskripsjons-appen.
# Bruker en ekstern Postgres-database (Supabase) — ikke Render-Postgres —
# slik at databasen overlever når web-tjenesten skaleres ned eller redeployes.
# Auth håndteres av Supabase Auth (samme prosjekt som DB-en).
#
# Slik bruker du den:
#   1. Push repoet til GitHub (allerede gjort).
#   2. Gå til https://dashboard.render.com/blueprints og velg "New Blueprint".
#   3. Pek på dette repoet — Render leser denne fila.
#   4. I formularet som åpnes, lim inn DATABASE_URL fra Supabase samt
#      SUPABASE_URL, SUPABASE_JWT_SECRET, og frontend-nøklene.

services:
  - type: web
    name: referat
    runtime: node
    plan: free            # Free-tier sover etter 15 min inaktivitet — bytt til "starter" for prod
    region: frankfurt
    branch: main
    # --include=dev needed because Render sets NODE_ENV=production globally,
    # which would otherwise skip devDependencies (drizzle-kit, tsx, vite, esbuild).
    buildCommand: npm install --include=dev && npm run db:push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # ----- Supabase: database -----
      - key: DATABASE_URL
        sync: false             # Supabase URI: postgresql://postgres.<ref>:<pwd>@aws-0-...pooler.supabase.com:5432/postgres

      # ----- Supabase Auth: server-side JWT-validering via JWKS -----
      # Server henter offentlig ECC-nøkkel fra <URL>/auth/v1/.well-known/jwks.json
      # og verifiserer JWT-en lokalt. Trenger ikke shared secret.
      - key: SUPABASE_URL
        sync: false             # https://<project-ref>.supabase.co (Project Settings → API)

      # ----- Supabase Auth: frontend (Vite injecter på build-time) -----
      - key: VITE_SUPABASE_URL
        sync: false             # Samme som SUPABASE_URL — Vite trenger VITE_-prefix for å eksponere til klient
      - key: VITE_SUPABASE_ANON_KEY
        sync: false             # Project Settings → API → publishable key (sb_publishable_...)

      # ----- Andre tjenester -----
      - key: OPENAI_API_KEY
        sync: false

      # ----- Valgfritt: HuggingFace nb-whisper -----
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HF_NB_WHISPER_MEDIUM_URL
        sync: false
      - key: HF_NB_WHISPER_LARGE_URL
        sync: false

      # ----- Valgfritt: Postgres-tuning -----
      - key: DB_POOL_MAX
        value: "10"
