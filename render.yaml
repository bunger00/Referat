# Render Blueprint for Møtetranskripsjons-appen.
# Bruker en ekstern Postgres-database (Supabase) — ikke Render-Postgres —
# slik at databasen overlever når web-tjenesten skaleres ned eller redeployes.
#
# Slik bruker du den:
#   1. Push repoet til GitHub (allerede gjort).
#   2. Gå til https://dashboard.render.com/blueprints og velg "New Blueprint".
#   3. Pek på dette repoet — Render leser denne fila.
#   4. I formularet som åpnes, lim inn `DATABASE_URL` fra Supabase
#      (Connection string → URI, helst Session mode på pooleren) og resten
#      av nøklene som er markert `sync: false`.

services:
  - type: web
    name: referat
    runtime: node
    plan: free            # Free-tier sover etter 15 min inaktivitet — bytt til "starter" for prod
    region: frankfurt
    branch: main
    # --include=dev needed because Render sets NODE_ENV=production globally,
    # which would otherwise skip devDependencies (drizzle-kit, tsx, vite, esbuild).
    buildCommand: npm install --include=dev && npm run db:push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # ----- Auto-generert -----
      - key: SESSION_SECRET
        generateValue: true     # Render lager en sterk tilfeldig verdi

      # ----- Du må sette disse manuelt i Render dashboard -----
      # `sync: false` betyr at Render ikke lagrer verdien i denne fila.
      - key: DATABASE_URL
        sync: false             # Supabase URI: postgresql://postgres.<ref>:<pwd>@aws-0-...pooler.supabase.com:5432/postgres
      - key: APP_PASSWORD_HASH
        sync: false             # Generer lokalt: `npm run setup`, kopier hashen
      - key: OPENAI_API_KEY
        sync: false             # Din OpenAI-nøkkel (sk-...)

      # ----- Valgfritt: HuggingFace nb-whisper -----
      # La være tomme for å bruke OpenAI Whisper som primær transkripsjon.
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HF_NB_WHISPER_MEDIUM_URL
        sync: false
      - key: HF_NB_WHISPER_LARGE_URL
        sync: false

      # ----- Valgfritt: Postgres-tuning -----
      - key: DB_POOL_MAX
        value: "10"             # Supabase nano = 60 totalt, hold appen lav
